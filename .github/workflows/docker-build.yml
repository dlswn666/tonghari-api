name: Docker Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      land_area_sync_allowlist_sha256:
        description: '승인된 canonical LAND_AREA_SYNC allowlist SHA-256 (enabled=true일 때 필수)'
        required: false
        type: string
      land_area_sync_allowlist_count:
        description: '승인된 LAND_AREA_SYNC allowlist target 수 (enabled=true일 때 필수)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: tonghari-api-production
  cancel-in-progress: false

env:
  IMAGE_REPOSITORY: ghcr.io/dlswn666/alimtalk-proxy

jobs:
  preflight:
    name: EC2 deployment preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require main branch and EC2 connection secrets
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_FINGERPRINT: ${{ secrets.EC2_SSH_FINGERPRINT }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Production deployment must run from refs/heads/main (received ${GITHUB_REF})."
            exit 1
          fi

          missing=()
          for secret_name in \
            EC2_HOST \
            EC2_USERNAME \
            EC2_SSH_KEY \
            EC2_SSH_FINGERPRINT
          do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("${secret_name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf -v missing_list '%s, ' "${missing[@]}"
            echo "::error::Missing required deployment secrets: ${missing_list%, }."
            exit 1
          fi

  quality-gates:
    name: Tests, TypeScript and writer guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        # actions/setup-node v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compile TypeScript
        run: npm run build

      - name: Verify property-building writer boundary
        run: node scripts/check-property-building-link-writers.mjs

  build-and-push:
    name: Build immutable image
    needs: quality-gates
    runs-on: ubuntu-latest
    timeout-minutes: 100
    permissions:
      contents: read
      packages: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      build_time: ${{ steps.metadata.outputs.build_time }}
    steps:
      - name: Checkout
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Prepare immutable build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        # docker/setup-buildx-action v3
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Login to GitHub Container Registry
        # docker/login-action v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push immutable image
        id: build
        # docker/build-push-action v5
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.metadata.outputs.build_time }}
            IMAGE_TAG=${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Require pushed image digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Docker build did not return a valid immutable digest."
            exit 1
          fi
          echo "Pushed immutable image digest ${IMAGE_DIGEST}."

  deploy:
    name: Deploy and verify exact revision
    needs: [preflight, build-and-push]
    runs-on: ubuntu-latest
    # production lock 40분 + operation lock 45분 + 실제 배포/rollback 30분을
    # 모두 command/job 취소 전에 완료하고 후처리 여유를 남긴다.
    timeout-minutes: 130
    permissions:
      contents: read
      packages: read
    steps:
      - name: Deploy immutable image to EC2
        # appleboy/ssh-action v1.2.5
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_EVENT_NAME: ${{ github.event_name }}
          EXPECTED_ALLOWLIST_DIGEST: ${{ inputs.land_area_sync_allowlist_sha256 || '' }}
          EXPECTED_ALLOWLIST_COUNT: ${{ inputs.land_area_sync_allowlist_count || '' }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          fingerprint: ${{ secrets.EC2_SSH_FINGERPRINT }}
          command_timeout: 120m
          envs: GHCR_USERNAME,GHCR_TOKEN,DEPLOY_EVENT_NAME,EXPECTED_ALLOWLIST_DIGEST,EXPECTED_ALLOWLIST_COUNT
          script: |
            set -Eeuo pipefail

            cd "$HOME/alimtalk-proxy"

            production_lock_path="${HOME}/alimtalk-proxy/.tonghari-api-production.lock"
            operation_lock_path="${HOME}/alimtalk-proxy/.land-area-sync-operation.lock"
            if [[ ! -e "${production_lock_path}" && ! -L "${production_lock_path}" ]]; then
              (
                umask 077
                set -o noclobber
                : > "${production_lock_path}"
              ) 2>/dev/null || true
            fi
            if [[ ! -f "${production_lock_path}" || -L "${production_lock_path}" ]] \
              || [[ "$(stat -c '%u' "${production_lock_path}")" != "$(id -u)" ]] \
              || [[ "$(stat -c '%a' "${production_lock_path}")" != "600" ]]; then
              echo "Shared production lock must be a deploy-user-owned regular mode 600 file."
              false
            fi
            exec 9>>"${production_lock_path}"
            if ! flock -w 2400 9; then
              echo "Timed out waiting for the shared production deployment lock."
              false
            fi

            if [[ ! -e "${operation_lock_path}" && ! -L "${operation_lock_path}" ]]; then
              (
                umask 077
                set -o noclobber
                : > "${operation_lock_path}"
              ) 2>/dev/null || true
            fi
            if [[ ! -f "${operation_lock_path}" || -L "${operation_lock_path}" ]] \
              || [[ "$(stat -c '%u' "${operation_lock_path}")" != "$(id -u)" ]] \
              || [[ "$(stat -c '%a' "${operation_lock_path}")" != "600" ]]; then
              echo "Land-area operation lock must be a deploy-user-owned regular mode 600 file."
              false
            fi
            exec 8>>"${operation_lock_path}"
            if ! flock -w 2700 8; then
              echo "Timed out waiting for the bounded land-area operation lock."
              false
            fi

            IMAGE_REPOSITORY="${{ env.IMAGE_REPOSITORY }}"
            IMAGE_TAG="${IMAGE_REPOSITORY}:${{ github.sha }}"
            EXPECTED_DIGEST="${{ needs.build-and-push.outputs.image_digest }}"
            IMAGE="${IMAGE_REPOSITORY}@${EXPECTED_DIGEST}"
            EXPECTED_GIT_SHA="${{ github.sha }}"
            EXPECTED_BUILD_TIME="${{ needs.build-and-push.outputs.build_time }}"
            EXPECTED_IMAGE_TAG="${IMAGE_TAG}"
            CONTAINER_NAME="alimtalk-proxy"
            CANDIDATE_CONTAINER="${CONTAINER_NAME}-candidate"
            ROLLBACK_CONTAINER="${CONTAINER_NAME}-rollback"
            had_previous=0
            new_container_attempted=0
            candidate_started=0
            registry_logged_in=0
            previous_image_id=""

            for variable_name in \
              GHCR_USERNAME \
              GHCR_TOKEN \
              DEPLOY_EVENT_NAME
            do
              if [[ -z "${!variable_name:-}" ]]; then
                echo "Required deployment variable ${variable_name} was not transferred to EC2."
                false
              fi
            done

            if [[ ! -f .env || -L .env ]]; then
              echo "Runtime .env must exist as a regular, non-symlink file on EC2."
              false
            fi

            env_owner="$(stat -c '%U' .env)"
            env_mode="$(stat -c '%a' .env)"
            if [[ "${env_owner}" != "$(id -un)" || "${env_mode}" != "600" ]]; then
              echo "Runtime .env must be owned by the deploy user with mode 600."
              false
            fi

            for variable_name in \
              DEV_API_JWT_SECRET \
              DEV_SUPABASE_URL \
              DEV_SUPABASE_SERVICE_ROLE_KEY
            do
              definition_count="$(grep -c "^${variable_name}=" .env || true)"
              if [[ "${definition_count}" != "1" ]] \
                || ! grep -Eq "^${variable_name}=.+" .env; then
                echo "Runtime .env must contain exactly one non-empty ${variable_name} entry."
                false
              fi
            done

            operation_target_count="$(grep -c '^BUILDING_WRITE_OPERATION_TARGETS=' .env || true)"
            if [[ "${operation_target_count}" != "1" ]]; then
              echo "Runtime .env must contain exactly one BUILDING_WRITE_OPERATION_TARGETS entry."
              false
            fi
            if ! grep -qx 'BUILDING_WRITE_OPERATION_TARGETS=development' .env; then
              echo "Runtime .env BUILDING_WRITE_OPERATION_TARGETS must be exactly development."
              false
            fi

            land_area_sync_flag_count="$(grep -Ec '^[[:space:]]*LAND_AREA_SYNC_ENABLED[[:space:]]*=' .env || true)"
            if [[ "${land_area_sync_flag_count}" -gt 1 ]]; then
              echo "Runtime .env may contain at most one LAND_AREA_SYNC_ENABLED entry."
              false
            fi
            expected_land_area_sync_enabled=false
            if [[ "${land_area_sync_flag_count}" -eq 1 ]]; then
              if grep -qx 'LAND_AREA_SYNC_ENABLED=true' .env; then
                expected_land_area_sync_enabled=true
              elif ! grep -qx 'LAND_AREA_SYNC_ENABLED=false' .env; then
                echo "Runtime .env LAND_AREA_SYNC_ENABLED must be exactly true or false."
                false
              fi
            fi

            allowed_targets_count="$(grep -c '^LAND_AREA_SYNC_ALLOWED_TARGETS=' .env || true)"
            if [[ "${allowed_targets_count}" -gt 1 ]]; then
              echo "Runtime .env may contain at most one LAND_AREA_SYNC_ALLOWED_TARGETS entry."
              false
            fi
            if [[ "${expected_land_area_sync_enabled}" == "true" ]]; then
              if [[ "${DEPLOY_EVENT_NAME}" != "workflow_dispatch" ]]; then
                echo "Enabled LAND_AREA_SYNC is allowed only for an explicit workflow_dispatch."
                false
              fi
              if [[ ! "${EXPECTED_ALLOWLIST_DIGEST}" =~ ^[0-9a-f]{64}$ ]]; then
                echo "Enabled LAND_AREA_SYNC requires an approved canonical allowlist SHA-256 input."
                false
              fi
              if [[ ! "${EXPECTED_ALLOWLIST_COUNT}" =~ ^[1-9][0-9]*$ ]]; then
                echo "Enabled LAND_AREA_SYNC requires a positive approved allowlist count input."
                false
              fi
              if [[ "${allowed_targets_count}" != "1" ]] \
                || ! grep -Eq '^LAND_AREA_SYNC_ALLOWED_TARGETS=.+$' .env; then
                echo "Enabled LAND_AREA_SYNC requires one non-empty allowlist."
                false
              fi

              allowed_targets_line="$(grep '^LAND_AREA_SYNC_ALLOWED_TARGETS=' .env)"
              allowed_targets_value="${allowed_targets_line#*=}"
              IFS=',' read -r -a allowed_target_entries <<< "${allowed_targets_value}"
              if [[ "${#allowed_target_entries[@]}" -eq 0 ]]; then
                echo "LAND_AREA_SYNC allowlist must contain at least one target."
                false
              fi
              for allowed_target_entry in "${allowed_target_entries[@]}"; do
                if [[ ! "${allowed_target_entry}" =~ ^development:[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}:[0-9]{19}$ ]]; then
                  echo "Enabled LAND_AREA_SYNC permits only exact development:unionUuid:PNU entries."
                  false
                fi
              done
            elif [[ "${allowed_targets_count}" -eq 1 ]] \
              && ! grep -qx 'LAND_AREA_SYNC_ALLOWED_TARGETS=' .env; then
              echo "Disabled LAND_AREA_SYNC requires an empty allowlist."
              false
            fi

            logout_registry() {
              if [[ "${registry_logged_in}" -eq 1 ]]; then
                docker logout ghcr.io >/dev/null 2>&1 || true
                registry_logged_in=0
              fi
            }

            verify_status_ok() {
              local container_name="$1"
              local port="$2"

              for attempt in $(seq 1 15); do
                if curl -fsS --connect-timeout 2 --max-time 5 "http://127.0.0.1:${port}/health" \
                  | docker exec -i "${container_name}" node -e '
                      let body = "";
                      process.stdin.setEncoding("utf8");
                      process.stdin.on("data", (chunk) => { body += chunk; });
                      process.stdin.on("end", () => {
                        try {
                          process.exit(JSON.parse(body).status === "ok" ? 0 : 1);
                        } catch {
                          process.exit(1);
                        }
                      });
                    ' >/dev/null 2>&1
                then
                  return 0
                fi
                sleep 2
              done

              return 1
            }

            rollback() {
              exit_code=$?
              rollback_failed=0
              trap - ERR
              set +e
              logout_registry

              if [[ "${candidate_started}" -eq 1 ]] \
                && docker container inspect "${CANDIDATE_CONTAINER}" >/dev/null 2>&1; then
                docker logs --tail 200 "${CANDIDATE_CONTAINER}" || true
                if ! docker rm -f "${CANDIDATE_CONTAINER}"; then
                  echo "Candidate cleanup failed; manual cleanup is required."
                fi
              fi

              echo "Deployment verification failed; restoring the previous container."
              if [[ "${new_container_attempted}" -eq 1 ]] \
                && docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
                docker logs --tail 200 "${CONTAINER_NAME}" || true
                if ! docker rm -f "${CONTAINER_NAME}"; then
                  echo "ROLLBACK_FAILED: failed candidate could not be removed."
                  rollback_failed=1
                fi
              fi

              if [[ "${had_previous}" -eq 1 ]]; then
                restore_source=""
                if docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
                  current_image_id="$(docker container inspect --format '{{.Image}}' "${CONTAINER_NAME}")"
                  if [[ "${current_image_id}" == "${previous_image_id}" ]]; then
                    restore_source="${CONTAINER_NAME}"
                  else
                    echo "ROLLBACK_FAILED: current container is not the previous image."
                    rollback_failed=1
                  fi
                elif docker container inspect "${ROLLBACK_CONTAINER}" >/dev/null 2>&1; then
                  rollback_image_id="$(docker container inspect --format '{{.Image}}' "${ROLLBACK_CONTAINER}")"
                  if [[ "${rollback_image_id}" != "${previous_image_id}" ]]; then
                    echo "ROLLBACK_FAILED: rollback container image ID is not the previous image."
                    rollback_failed=1
                  elif docker rename "${ROLLBACK_CONTAINER}" "${CONTAINER_NAME}"; then
                    restore_source="${CONTAINER_NAME}"
                  else
                    echo "ROLLBACK_FAILED: rollback container rename failed."
                    rollback_failed=1
                  fi
                else
                  echo "ROLLBACK_FAILED: previous container is missing."
                  rollback_failed=1
                fi

                if [[ "${rollback_failed}" -eq 0 && -n "${restore_source}" ]]; then
                  if ! docker start "${restore_source}" >/dev/null; then
                    echo "ROLLBACK_FAILED: previous container could not be started."
                    rollback_failed=1
                  elif [[ "$(docker container inspect --format '{{.Image}}' "${restore_source}")" != "${previous_image_id}" ]]; then
                    echo "ROLLBACK_FAILED: restored container image ID changed unexpectedly."
                    rollback_failed=1
                  elif ! verify_status_ok "${restore_source}" 3100; then
                    echo "ROLLBACK_FAILED: restored container health check failed."
                    rollback_failed=1
                  else
                    echo "Previous container restored and health-checked successfully."
                  fi
                fi
              fi

              if [[ "${rollback_failed}" -ne 0 ]]; then
                echo "ROLLBACK_FAILED: containers were preserved for manual recovery."
                exit 70
              fi

              exit "${exit_code}"
            }

            trap rollback ERR

            printf '%s' "${GHCR_TOKEN}" \
              | docker login ghcr.io --username "${GHCR_USERNAME}" --password-stdin >/dev/null 2>&1
            registry_logged_in=1
            docker pull "${IMAGE}"
            logout_registry

            if ! docker image inspect --format '{{range .RepoDigests}}{{println .}}{{end}}' "${IMAGE}" \
              | grep -Fq "@${EXPECTED_DIGEST}"; then
              echo "Pulled image digest does not match ${EXPECTED_DIGEST}."
              false
            fi

            manifest_attestation="$(
              docker run --rm \
                --env-file .env \
                "${IMAGE}" \
                node dist/cli/land-area-sync-allowlist-manifest.js
            )"
            IFS=':' read -r actual_allowlist_count actual_allowlist_digest manifest_extra \
              <<< "${manifest_attestation}"
            if [[ -n "${manifest_extra:-}" ]] \
              || [[ ! "${actual_allowlist_count}" =~ ^[0-9]+$ ]] \
              || { [[ "${actual_allowlist_count}" -gt 0 ]] \
                && [[ ! "${actual_allowlist_digest}" =~ ^[0-9a-f]{64}$ ]]; }; then
              echo "Candidate image returned an invalid allowlist attestation."
              false
            fi
            if [[ "${expected_land_area_sync_enabled}" == "true" ]]; then
              if [[ "${actual_allowlist_count}" != "${EXPECTED_ALLOWLIST_COUNT}" ]] \
                || [[ "${actual_allowlist_digest}" != "${EXPECTED_ALLOWLIST_DIGEST}" ]]; then
                echo "EC2 allowlist does not match the approved workflow_dispatch artifact."
                false
              fi
            elif [[ "${actual_allowlist_count}" != "0" ]] \
              || [[ -n "${actual_allowlist_digest}" ]]; then
              echo "Disabled LAND_AREA_SYNC attestation must be exactly count=0,digest=empty."
              false
            fi

            verify_health() {
              local container_name="$1"
              local port="$2"

              for attempt in $(seq 1 30); do
                if curl -fsS --connect-timeout 2 --max-time 5 "http://127.0.0.1:${port}/health" \
                  | docker exec -i \
                      -e EXPECTED_GIT_SHA="${EXPECTED_GIT_SHA}" \
                      -e EXPECTED_BUILD_TIME="${EXPECTED_BUILD_TIME}" \
                      -e EXPECTED_IMAGE_TAG="${EXPECTED_IMAGE_TAG}" \
                      -e EXPECTED_LAND_AREA_SYNC_ENABLED="${expected_land_area_sync_enabled}" \
                      -e EXPECTED_ALLOWLIST_COUNT="${actual_allowlist_count}" \
                      -e EXPECTED_ALLOWLIST_DIGEST="${actual_allowlist_digest}" \
                      "${container_name}" \
                      node -e '
                        let body = "";
                        process.stdin.setEncoding("utf8");
                        process.stdin.on("data", (chunk) => { body += chunk; });
                        process.stdin.on("end", () => {
                          try {
                            const health = JSON.parse(body);
                            const valid = health.status === "ok"
                              && health.gitSha === process.env.EXPECTED_GIT_SHA
                              && health.buildTime === process.env.EXPECTED_BUILD_TIME
                              && health.imageTag === process.env.EXPECTED_IMAGE_TAG
                              && String(health.features?.landAreaSyncEnabled)
                                === process.env.EXPECTED_LAND_AREA_SYNC_ENABLED
                              && String(health.features?.landAreaSyncAllowedTargetCount)
                                === process.env.EXPECTED_ALLOWLIST_COUNT
                              && health.features?.landAreaSyncAllowedTargetsDigest
                                === process.env.EXPECTED_ALLOWLIST_DIGEST;
                            process.exit(valid ? 0 : 1);
                          } catch {
                            process.exit(1);
                          }
                        });
                      ' >/dev/null 2>&1
                then
                  return 0
                fi
                sleep 2
              done

              return 1
            }

            docker rm -f "${CANDIDATE_CONTAINER}" >/dev/null 2>&1 || true
            candidate_started=1
            docker run -d \
              --name "${CANDIDATE_CONTAINER}" \
              --restart no \
              -p 127.0.0.1:13100:3100 \
              --env-file .env \
              --memory=800m \
              --memory-swap=1600m \
              "${IMAGE}"

            EXPECTED_IMAGE_ID="$(docker image inspect --format '{{.Id}}' "${IMAGE}")"
            CANDIDATE_IMAGE_ID="$(docker container inspect --format '{{.Image}}' "${CANDIDATE_CONTAINER}")"
            if [[ "${CANDIDATE_IMAGE_ID}" != "${EXPECTED_IMAGE_ID}" ]]; then
              echo "Candidate container image ID does not match the pulled immutable image."
              false
            fi

            if ! verify_health "${CANDIDATE_CONTAINER}" 13100; then
              echo "Candidate health response did not match git SHA ${EXPECTED_GIT_SHA}."
              false
            fi

            docker rm -f "${CANDIDATE_CONTAINER}"
            candidate_started=0

            if docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
              had_previous=1
              previous_image_id="$(docker container inspect --format '{{.Image}}' "${CONTAINER_NAME}")"
              if docker container inspect "${ROLLBACK_CONTAINER}" >/dev/null 2>&1; then
                docker rm -f "${ROLLBACK_CONTAINER}"
              fi
              docker stop "${CONTAINER_NAME}"
              docker rename "${CONTAINER_NAME}" "${ROLLBACK_CONTAINER}"
            fi

            new_container_attempted=1
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p 3100:3100 \
              --env-file .env \
              -v "$(pwd)/logs:/app/logs" \
              --memory=800m \
              --memory-swap=1600m \
              "${IMAGE}"

            RUNNING_IMAGE_ID="$(docker container inspect --format '{{.Image}}' "${CONTAINER_NAME}")"
            if [[ "${RUNNING_IMAGE_ID}" != "${EXPECTED_IMAGE_ID}" ]]; then
              echo "Running container image ID does not match the pulled immutable image."
              false
            fi

            if ! verify_health "${CONTAINER_NAME}" 3100; then
              echo "Health response did not match git SHA ${EXPECTED_GIT_SHA}."
              false
            fi

            trap - ERR
            if [[ "${had_previous}" -eq 1 ]]; then
              echo "Previous container preserved as ${ROLLBACK_CONTAINER} for rollback."
            fi
            docker image prune -f || true

            echo "Deployment verified for git SHA ${EXPECTED_GIT_SHA} and digest ${EXPECTED_DIGEST}."
