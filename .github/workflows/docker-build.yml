name: Docker Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tonghari-api-production
  cancel-in-progress: false

env:
  IMAGE_NAME: alimtalk-proxy

jobs:
  preflight:
    name: Deployment preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require main branch and deployment secrets
        shell: bash
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_FINGERPRINT: ${{ secrets.EC2_SSH_FINGERPRINT }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Production deployment must run from refs/heads/main (received ${GITHUB_REF})."
            exit 1
          fi

          missing=()
          for secret_name in \
            DOCKER_USERNAME \
            DOCKER_PASSWORD \
            EC2_HOST \
            EC2_USERNAME \
            EC2_SSH_KEY \
            EC2_SSH_FINGERPRINT
          do
            if [[ -z "${!secret_name:-}" ]]; then
              missing+=("${secret_name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf -v missing_list '%s, ' "${missing[@]}"
            echo "::error::Missing required deployment secrets: ${missing_list%, }."
            exit 1
          fi

  quality-gates:
    name: Tests, TypeScript and writer guard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Compile TypeScript
        run: npm run build

      - name: Verify property-building writer boundary
        run: node scripts/check-property-building-link-writers.mjs

  build-and-push:
    name: Build immutable image
    needs: [preflight, quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      build_time: ${{ steps.metadata.outputs.build_time }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare immutable build metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ steps.metadata.outputs.build_time }}
            IMAGE_TAG=${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Require pushed image digest
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [[ ! "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::Docker build did not return a valid immutable digest."
            exit 1
          fi
          echo "Pushed immutable image digest ${IMAGE_DIGEST}."

  deploy:
    name: Deploy and verify exact revision
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy immutable image to EC2
        # appleboy/ssh-action v1.2.5
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          fingerprint: ${{ secrets.EC2_SSH_FINGERPRINT }}
          script: |
            set -Eeuo pipefail

            cd "$HOME/alimtalk-proxy"

            IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            EXPECTED_DIGEST="${{ needs.build-and-push.outputs.image_digest }}"
            EXPECTED_GIT_SHA="${{ github.sha }}"
            EXPECTED_BUILD_TIME="${{ needs.build-and-push.outputs.build_time }}"
            EXPECTED_IMAGE_TAG="${{ env.IMAGE_NAME }}:${{ github.sha }}"
            CONTAINER_NAME="alimtalk-proxy"
            ROLLBACK_CONTAINER="${CONTAINER_NAME}-rollback"
            had_previous=0
            new_container_attempted=0

            rollback() {
              exit_code=$?
              trap - ERR
              set +e

              echo "Deployment verification failed; restoring the previous container."
              if [[ "${new_container_attempted}" -eq 1 ]] \
                && docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
                docker logs --tail 200 "${CONTAINER_NAME}" || true
                docker rm -f "${CONTAINER_NAME}" || true
              fi

              if [[ "${had_previous}" -eq 1 ]]; then
                if docker container inspect "${ROLLBACK_CONTAINER}" >/dev/null 2>&1; then
                  docker rename "${ROLLBACK_CONTAINER}" "${CONTAINER_NAME}" || true
                  docker start "${CONTAINER_NAME}" || true
                elif docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
                  docker start "${CONTAINER_NAME}" || true
                fi
              fi

              exit "${exit_code}"
            }

            trap rollback ERR

            docker pull "${IMAGE}"

            if ! docker image inspect --format '{{range .RepoDigests}}{{println .}}{{end}}' "${IMAGE}" \
              | grep -Fq "@${EXPECTED_DIGEST}"; then
              echo "Pulled image digest does not match ${EXPECTED_DIGEST}."
              false
            fi

            docker rm -f "${ROLLBACK_CONTAINER}" >/dev/null 2>&1 || true

            if docker container inspect "${CONTAINER_NAME}" >/dev/null 2>&1; then
              had_previous=1
              docker stop "${CONTAINER_NAME}"
              docker rename "${CONTAINER_NAME}" "${ROLLBACK_CONTAINER}"
            fi

            new_container_attempted=1
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              -p 3100:3100 \
              --env-file .env \
              -v "$(pwd)/logs:/app/logs" \
              --memory=800m \
              --memory-swap=1600m \
              "${IMAGE}"

            EXPECTED_IMAGE_ID="$(docker image inspect --format '{{.Id}}' "${IMAGE}")"
            RUNNING_IMAGE_ID="$(docker container inspect --format '{{.Image}}' "${CONTAINER_NAME}")"
            if [[ "${RUNNING_IMAGE_ID}" != "${EXPECTED_IMAGE_ID}" ]]; then
              echo "Running container image ID does not match the pulled immutable image."
              false
            fi

            health_verified=0
            for attempt in $(seq 1 30); do
              if curl -fsS --connect-timeout 2 --max-time 5 http://127.0.0.1:3100/health \
                | docker exec -i \
                    -e EXPECTED_GIT_SHA="${EXPECTED_GIT_SHA}" \
                    -e EXPECTED_BUILD_TIME="${EXPECTED_BUILD_TIME}" \
                    -e EXPECTED_IMAGE_TAG="${EXPECTED_IMAGE_TAG}" \
                    "${CONTAINER_NAME}" \
                    node -e '
                      let body = "";
                      process.stdin.setEncoding("utf8");
                      process.stdin.on("data", (chunk) => { body += chunk; });
                      process.stdin.on("end", () => {
                        try {
                          const health = JSON.parse(body);
                          const valid = health.status === "ok"
                            && health.gitSha === process.env.EXPECTED_GIT_SHA
                            && health.buildTime === process.env.EXPECTED_BUILD_TIME
                            && health.imageTag === process.env.EXPECTED_IMAGE_TAG;
                          process.exit(valid ? 0 : 1);
                        } catch {
                          process.exit(1);
                        }
                      });
                    ' >/dev/null 2>&1
              then
                health_verified=1
                break
              fi
              sleep 2
            done

            if [[ "${health_verified}" -ne 1 ]]; then
              echo "Health response did not match git SHA ${EXPECTED_GIT_SHA}."
              false
            fi

            trap - ERR
            if [[ "${had_previous}" -eq 1 ]]; then
              docker rm -f "${ROLLBACK_CONTAINER}"
            fi
            docker image prune -f || true

            echo "Deployment verified for git SHA ${EXPECTED_GIT_SHA} and digest ${EXPECTED_DIGEST}."
