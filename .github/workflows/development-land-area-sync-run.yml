name: Development Land Area Sync Runner

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: Repository-approved development target/evidence bundle
        required: true
        type: choice
        default: mia-seven-representative-20260725
        options:
          - mia-seven-representative-20260725

permissions:
  contents: read

jobs:
  run:
    name: Run repository-approved development targets
    runs-on: ubuntu-latest
    environment: land-area-sync-development-write
    timeout-minutes: 65
    steps:
      - name: Require approved main revision
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::Development land-area sync must run from refs/heads/main."
            exit 1
          fi

      - name: Checkout exact revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - name: Compile runner and validator
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm run build
          bash -n scripts/development-land-area-sync-remote-guardian.sh

      - name: Validate protected actor UUID
        shell: bash
        env:
          ACTOR_AUTH_USER_ID: ${{ secrets.DEV_GIS_SYSTEM_ADMIN_AUTH_UUID }}
        run: |
          set -euo pipefail
          uuid_pattern='^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          if [[
            -z "${ACTOR_AUTH_USER_ID:-}"
            || ! "${ACTOR_AUTH_USER_ID}" =~ ${uuid_pattern}
          ]]; then
            echo "::error::Protected development SYSTEM_ADMIN auth UUID is invalid."
            exit 1
          fi

      - name: Resolve repository-approved manifests
        id: manifest
        shell: bash
        env:
          MANIFEST_NAME: ${{ inputs.manifest }}
        run: |
          set -euo pipefail
          case "${MANIFEST_NAME}" in
            mia-seven-representative-20260725)
              target_path="development-land-area-sync-manifests/mia-seven-representative-target-20260725.json"
              db_approval_path="development-land-area-sync-manifests/mia-seven-representative-db-approval-20260725.json"
              evidence_path="development-land-area-sync-manifests/mia-seven-representative-evidence-20260725.json"
              ;;
            *)
              echo "::error::Manifest bundle is not repository-approved."
              exit 1
              ;;
          esac

          for candidate in \
            "${target_path}" \
            "${db_approval_path}" \
            "${evidence_path}"
          do
            if [[ ! -f "${candidate}" || -L "${candidate}" ]]; then
              echo "::error::Approved manifest must be a regular non-symlink file."
              exit 1
            fi
            size="$(stat -c '%s' "${candidate}")"
            if [[ "${size}" -lt 2 || "${size}" -gt 1048576 ]]; then
              echo "::error::Approved manifest size is invalid."
              exit 1
            fi
          done

          node - "${target_path}" "${db_approval_path}" "${evidence_path}" <<'NODE'
          const fs = require("node:fs");
          const {
            parseDevelopmentTargetManifest,
            parseDevelopmentDbApprovalManifest,
            parseDevelopmentEvidenceManifest,
            validateDevelopmentRunnerManifests,
          } = require("./dist/operations/development-land-area-sync-runner.js");
          const read = (file) => JSON.parse(fs.readFileSync(file, "utf8"));
          const target = parseDevelopmentTargetManifest(read(process.argv[2]));
          const approval = parseDevelopmentDbApprovalManifest(read(process.argv[3]));
          const evidence = parseDevelopmentEvidenceManifest(read(process.argv[4]));
          validateDevelopmentRunnerManifests(target, approval, evidence);
          NODE

          {
            echo "target_path=${target_path}"
            echo "db_approval_path=${db_approval_path}"
            echo "evidence_path=${evidence_path}"
          } >> "${GITHUB_OUTPUT}"

      - name: Configure pinned EC2 SSH identity
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_SSH_FINGERPRINT: ${{ secrets.EC2_SSH_FINGERPRINT }}
        run: |
          set -euo pipefail
          for variable_name in \
            EC2_HOST \
            EC2_USERNAME \
            EC2_SSH_KEY \
            EC2_SSH_FINGERPRINT
          do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "::error::Missing required EC2 connection secret."
              exit 1
            fi
          done
          if [[ ! "${EC2_USERNAME}" =~ ^[a-z_][a-z0-9_-]*$ ]]; then
            echo "::error::EC2 username format is invalid."
            exit 1
          fi
          if [[
            ${#EC2_HOST} -gt 253
            || ! "${EC2_HOST}" =~ ^[A-Za-z0-9]([A-Za-z0-9.-]*[A-Za-z0-9])?$
          ]]; then
            echo "::error::EC2 host format is invalid."
            exit 1
          fi

          install -d -m 700 "${HOME}/.ssh"
          install -m 600 /dev/null "${HOME}/.ssh/id_ed25519"
          printf '%s\n' "${EC2_SSH_KEY}" > "${HOME}/.ssh/id_ed25519"
          host_keys="$(ssh-keyscan -T 10 -t ed25519,ecdsa,rsa "${EC2_HOST}" 2>/dev/null)"
          if [[ -z "${host_keys}" ]]; then
            echo "::error::EC2 host key scan returned no keys."
            exit 1
          fi
          matched_host_key=""
          while IFS= read -r host_key; do
            fingerprint="$(
              printf '%s\n' "${host_key}" \
                | ssh-keygen -lf - -E sha256 \
                | awk '{print $2}'
            )"
            if [[ "${fingerprint}" == "${EC2_SSH_FINGERPRINT}" ]]; then
              matched_host_key="${host_key}"
              break
            fi
          done <<< "${host_keys}"
          if [[ -z "${matched_host_key}" ]]; then
            echo "::error::EC2 SSH fingerprint mismatch."
            exit 1
          fi
          printf '%s\n' "${matched_host_key}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Run guarded serial development sync
        id: remote
        shell: bash
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          TARGET_PATH: ${{ steps.manifest.outputs.target_path }}
          DB_APPROVAL_PATH: ${{ steps.manifest.outputs.db_approval_path }}
          EVIDENCE_PATH: ${{ steps.manifest.outputs.evidence_path }}
          GUARDIAN_PATH: scripts/development-land-area-sync-remote-guardian.sh
          ACTOR_AUTH_USER_ID: ${{ secrets.DEV_GIS_SYSTEM_ADMIN_AUTH_UUID }}
          RUN_KEY: ${{ github.run_id }}-${{ github.run_attempt }}
          EXPECTED_GIT_SHA: ${{ github.sha }}
          EXPECTED_IMAGE_TAG: ghcr.io/dlswn666/alimtalk-proxy:${{ github.sha }}
        run: |
          set -Eeuo pipefail
          if [[ ! "${RUN_KEY}" =~ ^[0-9]+-[0-9]+$ ]]; then
            echo "::error::Invalid workflow run key."
            exit 1
          fi
          if [[ ! "${ACTOR_AUTH_USER_ID}" =~ ^[0-9a-f-]{36}$ ]]; then
            echo "::error::Invalid actor UUID."
            exit 1
          fi
          if [[ ! -f "${GUARDIAN_PATH}" || -L "${GUARDIAN_PATH}" ]]; then
            echo "::error::Remote guardian must be a repository regular file."
            exit 1
          fi
          bash -n "${GUARDIAN_PATH}"

          ssh_options=(
            -i "${HOME}/.ssh/id_ed25519"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o "UserKnownHostsFile=${HOME}/.ssh/known_hosts"
          )
          remote_root="alimtalk-proxy/.development-land-area-sync-workflow/${RUN_KEY}"
          cleanup_finished=0

          cleanup_remote() {
            ssh "${ssh_options[@]}" "${EC2_USERNAME}@${EC2_HOST}" \
              "RUN_KEY='${RUN_KEY}' bash -s" <<'REMOTE_CLEANUP'
          set -euo pipefail
          operation_lock_path="${HOME}/alimtalk-proxy/.land-area-sync-operation.lock"
          run_root="${HOME}/alimtalk-proxy/.development-land-area-sync-workflow/${RUN_KEY}"
          test -f "${operation_lock_path}"
          test ! -L "${operation_lock_path}"
          exec 9>>"${operation_lock_path}"
          flock -w 30 9
          test -d "${run_root}"
          test ! -L "${run_root}"
          rm -f -- \
            "${run_root}/target.json" \
            "${run_root}/db-approval.json" \
            "${run_root}/evidence.json" \
            "${run_root}/guardian.sh" \
            "${run_root}/guardian.log" \
            "${run_root}/guardian.pid" \
            "${run_root}/guardian-started" \
            "${run_root}/artifact.json" \
            "${run_root}/status" \
            "${run_root}/validated"
          rmdir -- "${run_root}"
          test ! -e "${run_root}"
          test ! -L "${run_root}"
          REMOTE_CLEANUP
          }

          finish_step() {
            local prior_status="$?"
            trap - EXIT
            if [[ "${cleanup_finished}" -ne 1 ]]; then
              if ! cleanup_remote; then
                echo "::error::Remote cleanup or sensitive-file absence verification failed."
                exit 1
              fi
            fi
            exit "${prior_status}"
          }

          ssh "${ssh_options[@]}" "${EC2_USERNAME}@${EC2_HOST}" \
            "RUN_KEY='${RUN_KEY}' bash -s" <<'REMOTE_PREPARE'
          set -euo pipefail
          application_root="${HOME}/alimtalk-proxy"
          parent="${application_root}/.development-land-area-sync-workflow"
          run_root="${parent}/${RUN_KEY}"
          operation_lock_path="${application_root}/.land-area-sync-operation.lock"
          test -d "${application_root}"
          test ! -L "${application_root}"
          if [[ -e "${parent}" || -L "${parent}" ]]; then
            test -d "${parent}"
            test ! -L "${parent}"
          else
            mkdir -m 700 -- "${parent}"
          fi
          test "$(stat -c '%u' "${parent}")" = "$(id -u)"
          chmod 700 "${parent}"
          if [[ ! -e "${operation_lock_path}" && ! -L "${operation_lock_path}" ]]; then
            if ! (
              umask 077
              set -o noclobber
              : > "${operation_lock_path}"
            ) 2>/dev/null; then
              test -f "${operation_lock_path}"
              test ! -L "${operation_lock_path}"
            fi
          fi
          test -f "${operation_lock_path}"
          test ! -L "${operation_lock_path}"
          test "$(stat -c '%u' "${operation_lock_path}")" = "$(id -u)"
          chmod 600 "${operation_lock_path}"
          (umask 077; mkdir -m 700 -- "${run_root}")
          REMOTE_PREPARE
          trap finish_step EXIT

          scp "${ssh_options[@]}" "${TARGET_PATH}" \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_root}/target.json"
          scp "${ssh_options[@]}" "${DB_APPROVAL_PATH}" \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_root}/db-approval.json"
          scp "${ssh_options[@]}" "${EVIDENCE_PATH}" \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_root}/evidence.json"
          scp "${ssh_options[@]}" "${GUARDIAN_PATH}" \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_root}/guardian.sh"

          ssh "${ssh_options[@]}" "${EC2_USERNAME}@${EC2_HOST}" \
            "RUN_KEY='${RUN_KEY}' ACTOR_AUTH_USER_ID='${ACTOR_AUTH_USER_ID}' EXPECTED_GIT_SHA='${EXPECTED_GIT_SHA}' EXPECTED_IMAGE_TAG='${EXPECTED_IMAGE_TAG}' bash -s" <<'REMOTE_START'
          set -euo pipefail
          run_root="${HOME}/alimtalk-proxy/.development-land-area-sync-workflow/${RUN_KEY}"
          guardian="${run_root}/guardian.sh"
          guardian_log="${run_root}/guardian.log"
          guardian_pid_file="${run_root}/guardian.pid"
          for candidate in \
            "${run_root}/target.json" \
            "${run_root}/db-approval.json" \
            "${run_root}/evidence.json"
          do
            test -f "${candidate}"
            test ! -L "${candidate}"
            test "$(stat -c '%u' "${candidate}")" = "$(id -u)"
            chmod 600 "${candidate}"
          done
          test -f "${guardian}"
          test ! -L "${guardian}"
          test "$(stat -c '%u' "${guardian}")" = "$(id -u)"
          chmod 700 "${guardian}"
          install -m 600 /dev/null "${guardian_log}"
          nohup setsid env \
            "RUN_KEY=${RUN_KEY}" \
            "ACTOR_AUTH_USER_ID=${ACTOR_AUTH_USER_ID}" \
            "EXPECTED_GIT_SHA=${EXPECTED_GIT_SHA}" \
            "EXPECTED_IMAGE_TAG=${EXPECTED_IMAGE_TAG}" \
            bash "${guardian}" \
            </dev/null >>"${guardian_log}" 2>&1 &
          guardian_pid="$!"
          if [[ ! "${guardian_pid}" =~ ^[1-9][0-9]*$ ]]; then
            exit 1
          fi
          install -m 600 /dev/null "${guardian_pid_file}"
          printf '%s\n' "${guardian_pid}" > "${guardian_pid_file}"
          sleep 1
          if ! kill -0 "${guardian_pid}" 2>/dev/null; then
            test -f "${run_root}/status"
          fi
          REMOTE_START

          # 이 SSH wait가 취소되어도 setsid guardian은 계속 operation lock을
          # 보유하고 runner의 durable terminal drain과 cleanup을 마친다.
          ssh "${ssh_options[@]}" "${EC2_USERNAME}@${EC2_HOST}" \
            "RUN_KEY='${RUN_KEY}' bash -s" <<'REMOTE_WAIT'
          set -euo pipefail
          run_root="${HOME}/alimtalk-proxy/.development-land-area-sync-workflow/${RUN_KEY}"
          operation_lock_path="${HOME}/alimtalk-proxy/.land-area-sync-operation.lock"
          guardian_pid_file="${run_root}/guardian.pid"
          status_file="${run_root}/status"
          test -f "${guardian_pid_file}"
          test ! -L "${guardian_pid_file}"
          guardian_pid="$(tr -d '[:space:]' < "${guardian_pid_file}")"
          [[ "${guardian_pid}" =~ ^[1-9][0-9]*$ ]]
          while [[ ! -f "${status_file}" ]]; do
            test ! -L "${status_file}"
            kill -0 "${guardian_pid}" 2>/dev/null
            sleep 5
          done
          test ! -L "${status_file}"
          test "$(stat -c '%a' "${status_file}")" = "600"
          test -f "${operation_lock_path}"
          test ! -L "${operation_lock_path}"
          test "$(stat -c '%u' "${operation_lock_path}")" = "$(id -u)"
          test "$(stat -c '%a' "${operation_lock_path}")" = "600"
          exec 7>>"${operation_lock_path}"
          flock -w 30 7
          REMOTE_WAIT

          if [[ -e development-land-area-sync-output || -L development-land-area-sync-output ]]; then
            echo "::error::Local output directory must not pre-exist."
            exit 1
          fi
          mkdir -m 700 -- development-land-area-sync-output
          scp "${ssh_options[@]}" \
            "${EC2_USERNAME}@${EC2_HOST}:${remote_root}/status" \
            development-land-area-sync-output/status
          runner_status="$(
            tr -d '[:space:]' < development-land-area-sync-output/status
          )"
          if [[ ! "${runner_status}" =~ ^[0-9]+$ ]]; then
            echo "::error::Remote guardian status is invalid."
            exit 1
          fi
          if [[ "${runner_status}" -eq 0 || "${runner_status}" -eq 1 ]]; then
            scp "${ssh_options[@]}" \
              "${EC2_USERNAME}@${EC2_HOST}:${remote_root}/artifact.json" \
              development-land-area-sync-output/artifact.json
            scp "${ssh_options[@]}" \
              "${EC2_USERNAME}@${EC2_HOST}:${remote_root}/validated" \
              development-land-area-sync-output/validated
          fi
          cleanup_remote
          cleanup_finished=1
          trap - EXIT

      - name: Revalidate downloaded artifact
        id: validate
        if: always() && hashFiles('development-land-area-sync-output/artifact.json') != '' && hashFiles('development-land-area-sync-output/validated') != ''
        shell: bash
        env:
          TARGET_PATH: ${{ steps.manifest.outputs.target_path }}
          MANIFEST_LABEL: ${{ inputs.manifest }}
        run: |
          set -euo pipefail
          artifact="development-land-area-sync-output/artifact.json"
          public_artifact="development-land-area-sync-output/public-artifact.json"
          validated="development-land-area-sync-output/validated"
          status="development-land-area-sync-output/status"
          for candidate in "${artifact}" "${validated}" "${status}"; do
            if [[ ! -f "${candidate}" || -L "${candidate}" ]]; then
              echo "::error::Downloaded output must be a regular non-symlink file."
              exit 1
            fi
          done
          artifact_sha="$(sha256sum "${artifact}" | awk '{print $1}')"
          expected_attestation="LAND_AREA_DEVELOPMENT_RUN_ARTIFACT_VALIDATED:${artifact_sha}"
          if [[ "$(tr -d '\r\n' < "${validated}")" != "${expected_attestation}" ]]; then
            echo "::error::Remote artifact attestation mismatch."
            exit 1
          fi

          validation_root="$(mktemp -d)"
          mkdir -m 700 -- "${validation_root}/.development-land-area-sync"
          cleanup_validation() {
            rm -f -- \
              "${validation_root}/.development-land-area-sync/target.json" \
              "${validation_root}/.development-land-area-sync/artifact.json" \
              "${validation_root}/.development-land-area-sync/public-artifact.json"
            rmdir -- "${validation_root}/.development-land-area-sync"
            rmdir -- "${validation_root}"
            test ! -e "${validation_root}"
            test ! -L "${validation_root}"
          }
          trap cleanup_validation EXIT
          install -m 600 "${TARGET_PATH}" \
            "${validation_root}/.development-land-area-sync/target.json"
          install -m 600 "${artifact}" \
            "${validation_root}/.development-land-area-sync/artifact.json"
          validation_output="$(
            cd "${validation_root}"
            node "${GITHUB_WORKSPACE}/dist/cli/development-land-area-sync-validate.js" \
              --target ".development-land-area-sync/target.json" \
              --artifact ".development-land-area-sync/artifact.json" \
              --manifest-label "${MANIFEST_LABEL}" \
              --public-out ".development-land-area-sync/public-artifact.json"
          )"
          if [[ "${validation_output}" != "LAND_AREA_DEVELOPMENT_RUN_ARTIFACT_VALIDATED" ]]; then
            echo "::error::Repository validator rejected the downloaded artifact."
            exit 1
          fi
          if [[ -e "${public_artifact}" || -L "${public_artifact}" ]]; then
            echo "::error::Public artifact output must not pre-exist."
            exit 1
          fi
          install -m 600 \
            "${validation_root}/.development-land-area-sync/public-artifact.json" \
            "${public_artifact}"
          if [[ ! -f "${public_artifact}" || -L "${public_artifact}" ]]; then
            echo "::error::Public artifact output must be a regular file."
            exit 1
          fi
          printf '%s\n' "${expected_attestation}" \
            > development-land-area-sync-output/validated-runner
          chmod 600 development-land-area-sync-output/validated-runner
          cleanup_validation
          trap - EXIT

      - name: Upload sanitized run artifact
        if: always() && steps.validate.outcome == 'success' && hashFiles('development-land-area-sync-output/validated-runner') != '' && hashFiles('development-land-area-sync-output/public-artifact.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: development-land-area-sync-${{ inputs.manifest }}-${{ github.run_id }}
          path: development-land-area-sync-output/public-artifact.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce development run gate
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          status_file="development-land-area-sync-output/status"
          artifact_file="development-land-area-sync-output/artifact.json"
          validation_file="development-land-area-sync-output/validated-runner"
          if [[ ! -f "${status_file}" || -L "${status_file}" ]]; then
            echo "::error::Remote runner status is missing."
            exit 1
          fi
          runner_status="$(tr -d '[:space:]' < "${status_file}")"
          if [[ ! "${runner_status}" =~ ^[0-9]+$ ]]; then
            echo "::error::Remote runner status is invalid."
            exit 1
          fi
          if [[
            ! -f "${artifact_file}"
            || ! -f "${validation_file}"
            || -L "${artifact_file}"
            || -L "${validation_file}"
          ]]; then
            echo "::error::Validated full artifact is missing."
            exit 1
          fi
          gate_status="$(
            node -e '
              const fs = require("node:fs");
              const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              process.stdout.write(String(value?.gate?.status ?? ""));
            ' "${artifact_file}"
          )"
          target_count="$(
            node -e '
              const fs = require("node:fs");
              const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              process.stdout.write(String(value?.targetCount ?? ""));
            ' "${artifact_file}"
          )"
          observed_count="$(
            node -e '
              const fs = require("node:fs");
              const value = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
              process.stdout.write(String(value?.observedPropertyUnitCount ?? ""));
            ' "${artifact_file}"
          )"
          {
            echo "### Development land-area sync"
            echo
            echo "- Manifest: \`${{ inputs.manifest }}\`"
            echo "- Gate: \`${gate_status}\`"
            echo "- PNU targets: \`${target_count}\`"
            echo "- Verified property units: \`${observed_count}\`"
            echo "- Artifact: sanitized JSON uploaded"
          } >> "${GITHUB_STEP_SUMMARY}"
          if [[ "${runner_status}" != "0" || "${gate_status}" != "PASS" ]]; then
            echo "::error::Development land-area sync gate did not pass."
            exit 1
          fi
